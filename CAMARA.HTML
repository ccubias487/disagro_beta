<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Captura Múltiple de Fotos</title>
  <style>
    video, canvas, img {
      max-width: 100%;
      border: 1px solid #ccc;
    }
    #galeria img {
      width: 100px;
      margin: 5px;
    }
  </style>
</head>
<body>
  <h2>Captura de Fotos para Reporte</h2>

  <video id="video" autoplay playsinline></video>
  <br>
  <button onclick="tomarFoto()">📸 Tomar Foto</button>
  <button onclick="enviarReporte()">📤 Enviar Reporte</button>

  <h3>Fotos Capturadas:</h3>
  <div id="galeria"></div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const galeria = document.getElementById('galeria');
    const fotos = []; // Aquí se guardan las imágenes en base64

    // Acceder a la cámara
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(error => {
        alert('Error al acceder a la cámara: ' + error);
      });

    // Función para tomar foto
    function tomarFoto() {
      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      const dataURL = canvas.toDataURL('image/png');
      fotos.push(dataURL);

      // Mostrar la imagen en la galería
      const img = document.createElement('img');
      img.src = dataURL;
      galeria.appendChild(img);
    }

    // Simulación de envío de reporte
    function enviarReporte() {
      console.log("Fotos para enviar:", fotos);

      // Aquí podrías hacer un fetch() o POST con las fotos
      alert(`Se enviarán ${fotos.length} fotos en el reporte.`);
    }
  </script>
</body>
</html>
