<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Captura y Galería</title>
  <style>
    video, canvas, img {
      max-width: 100%;
      border: 1px solid #ccc;
    }
    #galeria img {
      width: 100px;
      margin: 5px;
    }
  </style>
</head>
<body>
  <h2>Reporte con Fotos</h2>

  <video id="video" autoplay playsinline></video>
  <br>
  <button onclick="tomarFoto()">📸 Tomar Foto</button>
  <button onclick="abrirGaleria()">🖼️ Seleccionar desde Galería</button>
  <button onclick="enviarReporte()">📤 Enviar Reporte</button>

  <input type="file" id="inputGaleria" accept="image/*" multiple style="display: none;" />

  <h3>Fotos Capturadas/Seleccionadas:</h3>
  <div id="galeria"></div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const galeria = document.getElementById('galeria');
    const inputGaleria = document.getElementById('inputGaleria');
    const fotos = [];

    // Acceder a la cámara
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(error => {
        alert('Error al acceder a la cámara: ' + error);
      });

    // Tomar foto desde cámara
    function tomarFoto() {
      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataURL = canvas.toDataURL('image/png');
      agregarFoto(dataURL);
    }

    // Abrir selector de archivos
    function abrirGaleria() {
      inputGaleria.click();
    }

    // Procesar archivos seleccionados desde galería
    inputGaleria.addEventListener('change', function () {
      const archivos = inputGaleria.files;
      for (let archivo of archivos) {
        const lector = new FileReader();
        lector.onload = function (e) {
          const dataURL = e.target.result;
          agregarFoto(dataURL);
        };
        lector.readAsDataURL(archivo);
      }
    });

    // Agregar imagen a galería y al array
    function agregarFoto(dataURL) {
      fotos.push(dataURL);

      const img = document.createElement('img');
      img.src = dataURL;
      galeria.appendChild(img);
    }

    // Simulación de envío de reporte
    function enviarReporte() {
      console.log("Fotos para enviar:", fotos);
      alert(`Se enviarán ${fotos.length} fotos en el reporte.`);
    }
  </script>
</body>
</html>
